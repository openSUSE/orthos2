name: Tests

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - master

jobs:
  unit:
    runs-on: ubuntu-latest
    # Skip on PRs from forks: the SCC_CREDENTIALS and CODACY_PROJECT_TOKEN
    # secrets are not available to workflows triggered by fork PRs, so the
    # job would fail before it can run any tests.
    if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork }}

    strategy:
      max-parallel: 4
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v3
      - name: Allow writing from inside the container
        run: |
          chmod g+w,o+w .
      - name: Install Django
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install django>4.2
      - name: Create env files for testing
        run: |
          python3 docker/manage-secrets.py
      - name: Create Credentials
        env:
          SCC_CREDENTIALS: ${{ secrets.SCC_CREDENTIALS }}
        run: |
          echo "$SCC_CREDENTIALS" > docker/secrets/SCCcredentials
      - name: Build images
        run: |
          make build-dev
      - name: Start Compose Stack
        env:
          NETBOX_START_PERIOD: 480s
        run: |
          make up-dev
      - name: Run Tests
        run: |
          make test-dev
      - name: Upload coverage
        if: ${{ github.event_name == 'push' || (github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork) }}
        uses: codacy/codacy-coverage-reporter-action@v1.3.0
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          coverage-reports: coverage.xml
  