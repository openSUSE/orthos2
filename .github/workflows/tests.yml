name: Tests

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - master

jobs:
  unit:
    runs-on: ubuntu-latest

    strategy:
      max-parallel: 4
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v3
      - name: Allow writing from inside the container
        run: |
          chmod g+w,o+w .
      - name: Install Django
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install django>4.2
      - name: Create env files for testing
        run: |
          python3 docker/manage-secrets.py
      - name: Build images
        run: |
          docker compose build
      - name: Start Compose Stack
        env:
          NETBOX_START_PERIOD: 480s
        run: |
          docker compose -f compose.yaml -f compose.override.yml up -d
      - name: Run Tests
        run: |
          docker compose exec -it orthos2 bash -c 'coverage run --source="." -m pytest orthos2'
          docker compose exec -it orthos2 bash -c 'coverage report'
          docker compose exec -it orthos2 bash -c 'coverage xml'
      - name: Upload coverage
        if: ${{ github.event_name == 'push' || (github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork) }}
        uses: codacy/codacy-coverage-reporter-action@v1.3.0
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          coverage-reports: coverage.xml
  