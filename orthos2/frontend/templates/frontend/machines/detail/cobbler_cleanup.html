{% extends 'frontend/machines/machine.html' %}

{% block tabcontent %}
<div class="container-fluid mt-3">
  <form method="POST" action="{% url 'frontend:cleanup_domain_cobbler_page' machine.id %}">
    {% csrf_token %}
    <div class="row">
      <div class="col-12">
        <h5>Machines to be deleted from Cobbler</h5>
        <div style="max-height: 60vh; overflow-y: auto; padding-right: 15px;">
          {% for domain, fqdns in diff.items %}
            {% if fqdns %}
              <p class="mt-3">{{ domain }}</p>
              <ul class="list-group">
                {% for fqdn in fqdns %}
                  <li class="list-group-item py-1">
                    <div class="form-check ml-3 mb-0">
                      <input class="form-check-input" type="checkbox" checked value="{{ fqdn }}" name="fqdn" id="stale-machine-{{ forloop.parentloop.counter0 }}-{{ forloop.counter0 }}">
                      <label class="form-check-label" for="stale-machine-{{ forloop.parentloop.counter0 }}-{{ forloop.counter0 }}">{{ fqdn }}</label>
                    </div>
                  </li>
                {% endfor %}
              </ul>
            {% endif %}
          {% endfor %}
        </div>
      </div>
    </div>

    <div class="row mt-3">
      <div class="col-12">
        <button type="submit" class="btn btn-danger" id="confirm-cobbler-prune-btn" onclick="return confirm('Delete selected machine(s) from Cobbler?');">Delete Selected</button>
      </div>
    </div>
  </form>
</div>
{% endblock %}
