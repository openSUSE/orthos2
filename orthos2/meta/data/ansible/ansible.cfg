[defaults]

# disable default cowsay usage for ansible output
nocows = 1
interpreter_python = auto_silent
strategy = free
# Disable Host-Key-Checking as we reinstall hosts
host_key_checking = False
# Enable custom callback plugin for database storage
callbacks_enabled = orthos2_history

[inventory]
# Enable custom inventory plugins
enable_plugins = orthos2
# Path to inventory plugins directory
inventory_plugins = /usr/lib/orthos2/ansible/inventory_plugins

[ssh_connection]
# improve speed by using less ssh connections.
# See https://docs.ansible.com/ansible/2.10/reference_appendices/config.html#ansible-pipelining
pipelining = true
