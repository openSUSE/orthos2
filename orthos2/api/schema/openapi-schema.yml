  /api/powercycle:
    get:
      operationId: listPowerCommands
      description: "Command to power cycle machines or the get the current status.\n\
        \nUsage:\n    POWER <fqdn> <action>\n\nArguments:\n    fqdn   - FQDN or hostname\
        \ of the machine.\n    action - Specify new power state. Actions are:\n\n\
        \               on                 : Power on.\n               off       \
        \         : Power off via SSH. If didn't succeed, use remote power.\n    \
        \           off-ssh            : Power off via SSH only.\n               off-remotepower\
        \    : Power off via remote power only.\n               reboot           \
        \  : Reboot via SSH. If didn't succeed, use remote power.\n              \
        \ reboot-ssh         : Reboot via SSH only.\n               reboot-remotepower\
        \ : Reboot via remote power only.\n               status             : Get\
        \ power status.\n\nExample:\n    POWER foo.domain.tld reboot\n"
      parameters:
      - name: fqdn
        in: query
        schema:
          type: string
      - name: action
        in: query
        schema:
          type: string
          enum:
          - 'off'
          - off-remotepower
          - off-ssh
          - 'on'
          - reboot
          - reboot-remotepower
          - reboot-ssh
          - status
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items: {}
          description: ''
      tags:
      - API
  /api/add:
    get:
      operationId: listAddCommands
      description: "Adds items to the database. All information will be queried interactively.\n\
        \n    Usage:\n        ADD <item> [args*]\n\n    Arguments:\n        item -\
        \ Specify the item which should be added. Items are:\n\n                machine\
        \                       : Add a machine (superusers only).\n             \
        \   annotation <fqdn>             : Add an annotation to a specific\n    \
        \                                            machine (no bugreports).\n  \
        \              serialconsole <fqdn>          : Add a serial console to a specific\n\
        \                                                machine (superusers only).\n\
        \                remotepower <fqdn>            : Add a remote power to a specific\n\
        \                                                machine (superusers only).\n\
        \                virtualmachine <architecture> : Add a virtual machine on\
        \ a specific\n                                                architecture.\n\
        \                bmc <fqdn>                    : Add a bmc to a machine.\n\
        \n    Example:\n        ADD machine\n        ADD virtualmachine x86_64\n \
        \       ADD serialconsole foo.domain.tld\n        ADD remotepower foo.domain.tld\n\
        \        ADD annotation foo.domain.tld\n        ADD bmc foo.domain.tld\n \
        \   "
      parameters:
      - name: args*
        in: query
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items: {}
          description: ''
      tags:
