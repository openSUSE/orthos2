  /api/rescan:
    get:
      operationId: listRescanCommands
      description: "Command to rescan machines. Normally all machines are scanned\
        \ once a day\nautomatically. For some reason it makes sense to rescan machines\
        \ manually\nimmediately, e.g. if new hardware has been added.\n\nUsage:\n\
        \    RESCAN <fqdn> <option>\n\nArguments:\n    fqdn   - FQDN or hostname of\
        \ the machine (\"all\" without option will simulate daily machine check).\n\
        \    option - Specify what should be rescanned. Options are:\n\n         \
        \      status            : Check machine status (ping, SSH, login).\n    \
        \           all               : Complete scan.\n               misc      \
        \        : Check miscellaneous software/hardware attributes.\n           \
        \    installations     : Rescan installed distributions only.\n\nExample:\n\
        \    RESCAN foo.domain.tld status\n"
      parameters:
      - name: fqdn
        in: query
        schema:
          type: string
      - name: fqdn
        in: query
        schema:
          type: string
      - name: option
        in: query
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items: {}
          description: ''
      tags:
      - API
  /api/regenerate:
    get:
      operationId: listRegenerateCommands
      description: "Command to regenerate machine-related files or configuration files\
        \ for various\nservices (superusers only).\n\nUsage:\n    REGENERATE <service>\
        \ [options] [ <fqdn> ]\n\nArguments:\n    service - Specify which service\
        \ configuration should be regenerated.\n              Without passing fqdn\
        \ parameter, all hosts/servers are synced.\n        Options are:\n       \
        \     motd               : Message of the day.\n            cobbler      \
        \      : Cobbler configuration\n            cobbler_domain     : Cobbler Server/Domain\n\
        \            serialconsole      : Serial console files\n\n    fqdn    - FQDN\
        \ or hostname of the machine/server.\n              Passing this optional\
        \ parameter restricts above service\n              to specific hosts or servers:\n\
        \n            motd             : Hostname for which /etc/motd is regenerated\n\
        \            cobbler          : Cobbler host/system configuration which is\
        \ synced with orthos.\n            cobbler_domain   : Cobbler server configuration\
        \ which is synced with orthos.\n            serialconsole    : Serial console\
        \ server which is synced\n\n    options - [--force] (Not implemented yet)\n\
        \n            cobbler          : Force deletion (remove) and recreation (add)\
        \ of cobbler\n                               configuration of the specified\
        \ systems without this param\n                               the cobbler entry\
        \ is updated (edit) if already available\n\nExample:\n    REGENERATE cobbler\
        \                             # regenerate/sync cobbler of all cobbler servers\
        \ (use with care)\n    REGENERATE cobbler_domain cobbler.arch.suse.de #  \
        \  of a specific domain/cobbler server\n    REGENERATE cobbler host.arch.suse.de\
        \           #    of a specific machine\n    REGENERATE serialconsole sconsole1.arch.suse.de\n\
        \    REGENERATE motd foo.domain.tld\n"
      parameters:
      - name: service
        in: query
        schema:
          type: string
      - name: service
        in: query
        schema:
          type: string
      - name: fqdn
        in: query
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items: {}
          description: ''
      tags:
      - API
