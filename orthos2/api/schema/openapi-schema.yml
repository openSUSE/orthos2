  /api/setup:
    get:
      operationId: listSetupCommands
      description: "Command to setup (re-install) a machine.\n\nUsage:\n    SETUP\
        \ <fqdn> list\n    SETUP <fqdn> <choice>\n\nArguments:\n    machine - FQDN\
        \ or hostname of the machine.\n    choice  - Distribution setup which should\
        \ be applied/installed.\n\nExample:\n    SETUP foo.suse.de list\n    SETUP\
        \ foo.suse.de SLE12-SP2-install-auto\n"
      parameters:
      - name: fqdn
        in: query
        schema:
          type: string
      - name: option_or_choice
        in: query
        schema:
          type: string
      responses:
