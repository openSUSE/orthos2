  /api/query:
    post:
      operationId: createQueryCommand
      description: "Command to query machines. You can just specify a comma-separated\
        \ list of\nfields, then you get that fields for all machines.\n\nExample:\n\
        \n    QUERY fqdn, cpu_physical\n    QUERY fqdn WHERE cpu_model =~ Intel\n\
        \    QUERY fqdn WHERE cpu_model =~ Intel OR !efi\n\nValid operators are:\n\
        ------------------------------------------------------------------------------\n\
        !<field>            not\n== =                exactly equal\n=~           \
        \       contains\n=*                  startswith\n!=                  unequal\n\
        >  <                greater or less than (numbers only)\n>= <=           \
        \    greater equals or less equals (numbers only)\nAND                 logical\
        \ conjunction\nOR                  logical disjunction\n------------------------------------------------------------------------------\n"
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                data*:
                  type: string
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                data*:
                  type: string
      responses:
        '201':
          content:
            application/json:
              schema: {}
          description: ''
      tags:
