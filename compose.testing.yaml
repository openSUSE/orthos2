# This file is specifically to test the production dockerfile, without needing to already have a netbox, postgres, test machine, and cobbler on hand
# Combine with the shared services in compose.common.yaml via the Makefile, which also
# builds the orthos2/orthos2-static images in the required order before starting:
#   make up-testing
services:
  orthos2:
    image: orthos2:latest
    secrets:
      - NetboxToken
      - OrthosKey
      - OIDCsecret
    env_file:
      - ".env"
      - "docker/orthos/orthos2dev.env"
  orthos2_taskmanager:
    image: orthos2:latest
    secrets:
      - NetboxToken
      - OrthosKey
      - OIDCsecret
    env_file:
      - ".env"
      - "docker/orthos/orthos2dev.env"
  orthos2_nginx:
    image: orthos2-static:latest
    depends_on:
      - orthos2
    env_file:
      - ".env"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nginx-static.rule=Host(`${FQDN:?error}`) && PathPrefix(`/static/`)"
      - "traefik.http.routers.nginx-static.entrypoints=websecure"
      - "traefik.http.routers.nginx-static.tls=true"
      - "traefik.http.services.nginx-static.loadbalancer.server.port=80"
      - "traefik.http.routers.nginx-static.priority=100"

secrets:
  NetboxToken:
    file: docker/secrets/NetboxToken
  OrthosKey:
    file: docker/secrets/OrthosKey
  OIDCsecret:
    file: docker/secrets/OIDCsecret
