# Local dev stack: builds docker/develop.dockerfile.
# Combine with the shared services in compose.common.yaml:
#   docker compose -f compose.common.yaml -f compose.dev.yaml -f compose.dev.override.yml up -d
services:
  orthos2:
    build:
      context: .
      dockerfile: docker/develop.dockerfile
      secrets:
        - SCCcredentials
    env_file:
      - "docker/orthos/orthos2dev.env"
  orthos2_taskmanager:
    build:
      context: .
      dockerfile: docker/develop.dockerfile
      secrets:
        - SCCcredentials
    env_file:
      - "docker/orthos/orthos2dev.env"
